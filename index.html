<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>MBサンマ体験版</title>

  <!-- CSS（style/ 配下が正） -->
  <link rel="stylesheet" href="style/base.css" />
  <link rel="stylesheet" href="style/overlay.css" />
  <link rel="stylesheet" href="style/hand.css" />
  <link rel="stylesheet" href="style/center.css" />
  <link rel="stylesheet" href="style/cpu.css" />
  <link rel="stylesheet" href="style/river.css" />
  <link rel="stylesheet" href="style/rightArea.css" />
</head>

<body>
  <div class="app">

    <!-- ★ 左上：タイトル＋軽い説明（固定しない / 既存を壊さない） -->
    <div class="topIntro">
      <div class="topIntroTitle">MBサンマ体験版</div>
      <div class="topIntroSub">三麻（萬子なし+1m/9m） / 赤5p・赤5sあり / ローカル実行（file://）</div>
    </div>

    <!-- 上部（ボタンは1段下へ） -->
    <div class="topbar">
      <button id="newBtn" type="button">新しい半荘</button>
      <button id="cpuOpenToggleBtn" type="button">CP手牌：裏</button>
      <button id="debugOpenBtn" type="button">デバッグ配牌</button>
    </div>

    <!-- 受け入れ表示 ON/OFF（右上固定） -->
    <button id="ukeireToggleBtn" type="button">受け入れ：ON</button>

    <!-- 中央ゾーン -->
    <div id="centerUi"></div>

    <!-- CPU：左 -->
    <div class="cpuSide cpuLeftSide">
      <div class="cpuHand" id="cpuLeftHand"></div>
      <div class="cpuRiver" id="cpuLeftRiver"></div>
    </div>

    <!-- CPU：右 -->
    <div class="cpuSide cpuRightSide">
      <div class="cpuRiver" id="cpuRightRiver"></div>
      <div class="cpuHand" id="cpuRightHand"></div>
    </div>

    <!-- 自分の河 -->
    <div class="river-wrap">
      <div id="river"></div>
    </div>

    <!-- 手牌ゾーン -->
    <div class="hand-wrap">
      <div class="actionbar" aria-label="actions">
        <button id="peiBtn" type="button" class="actionBtn">ペー</button>
        <button id="ponBtn" type="button" class="actionBtn">ポン</button>
        <button id="kanBtn" type="button" class="actionBtn">カン</button>
        <button id="passBtn" type="button" class="actionBtn">スキップ</button>
        <button id="riichiBtn" type="button" class="actionBtn">リーチ</button>
        <button id="ronBtn" type="button" class="actionBtn">ロン</button>
        <button id="tsumoBtn" type="button" class="actionBtn">ツモ</button>
      </div>

      <!-- ステータス -->
      <div id="stats"></div>

      <!-- 右側表示（北抜き・副露） -->
      <div class="rightArea">
        <div class="rightBlock">
          <div class="rightLabel">北</div>
          <div id="peis"></div>
        </div>
        <div class="rightBlock">
          <div class="rightLabel">副露</div>
          <div id="melds"></div>
        </div>
      </div>

      <!-- 手牌 -->
      <div id="hand"></div>
    </div>

  </div>

  <!-- オーバーレイ：ツモ -->
  <div id="tsumoOverlay">
    <div class="agariStage">
      <div class="agariFx agariFxTsumo"></div>
      <div class="agariBadge agariBadgeTsumo">
        <img src="img/tsumo.png" alt="ツモ" />
      </div>
      <div class="hint">クリックで閉じる</div>
    </div>
  </div>

  <!-- オーバーレイ：流局 -->
  <div id="ryukyokuOverlay">
    <div class="inner">
      <img src="img/ryukyoku.png" alt="流局" />
      <div class="hint">クリックで閉じる</div>
    </div>
  </div>

  <!-- オーバーレイ：ロン -->
  <div id="ronOverlay">
    <div class="agariStage">
      <div class="agariFx agariFxRon"></div>
      <div class="agariBadge agariBadgeRon">
        <img src="img/ron.png" alt="ロン" />
      </div>
      <div class="hint">クリックで閉じる</div>
    </div>
  </div>

  <!-- 結果確認画面（新規） -->
  <div id="resultOverlay">
    <div id="resultPanel">
      <div id="resultHeader">
        <div id="resultTitle">和了結果</div>
        <div id="resultSubtitle">クリックで次へ</div>
      </div>

      <div id="resultBody">
        <div id="resultTopRow">
          <div id="resultWinType">ツモ</div>
          <div id="resultWinner">あなた</div>
        </div>

        <div id="resultHandBlock">
          <div class="resultBlockTitle">手牌</div>
          <div id="resultHandTiles"></div>
        </div>

        <div id="resultInfoRow">
          <div id="resultDoraBlock">
            <div class="resultBlockTitle">ドラ</div>
            <div id="resultDoraTiles"></div>
          </div>

          <div id="resultUraDoraBlock">
            <div class="resultBlockTitle">裏ドラ</div>
            <div id="resultUraDoraTiles"></div>
          </div>
        </div>

        <div id="resultYakuBlock">
          <div class="resultBlockTitle">役</div>
          <div id="resultYakuList"></div>
        </div>

        <div id="resultScoreBlock">
          <div id="resultHanFu">0翻 0符</div>
          <div id="resultPointText">0点</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 演出：カン -->
  <div id="kanOverlay" aria-hidden="true">
    <div class="inner">
      <img src="img/kan.png" alt="カン" />
    </div>
  </div>

  <!-- 演出：ポン -->
  <div id="ponOverlay" aria-hidden="true">
    <div class="inner">
      <img src="img/pon.png" alt="ポン" />
    </div>
  </div>

  <!-- 演出：リーチ -->
  <div id="riichiOverlay" aria-hidden="true">
    <div class="inner">
      <img src="img/riichi.png" alt="リーチ" />
    </div>
  </div>

  <!-- 演出：ツモ文字 -->
  <div id="drawOverlay">
    <div class="inner">
      <div class="drawText">ツモ</div>
    </div>
  </div>

  <!-- JS（js/ 配下が正） -->
  <script src="js/core.js"></script>
  <script src="js/core2.js"></script>
  <script src="js/shanten.js"></script>
  <script src="js/fu.js"></script>
  <script src="js/yaku.js"></script>
  <script src="js/yakuman.js"></script>

  <script src="js/render_stats.js"></script>
  <script src="js/render_right.js"></script>
  <script src="js/render_cpu.js"></script>
  <script src="js/render_center.js"></script>
  <script src="js/render.js"></script>

  <script src="js/actions.js"></script>
  <script src="js/kan.js"></script>
  <script src="js/pei.js"></script>
  <script src="js/riichi.js"></script>
  <script src="js/cpai.js"></script>
  <script src="js/turn.js"></script>
  <script src="js/turn2.js"></script>
  <script src="js/call.js"></script>
  <script src="js/tensukeisan.js"></script>
  <script src="js/seisan.js"></script>
  <script src="js/result.js"></script>
  <script src="js/main.js"></script>
  <script src="js/furiten.js"></script>
  <script src="js/debug.js"></script>
</body>
</html>
